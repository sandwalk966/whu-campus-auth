# HTTP 服务
server {
    listen 80;
    server_name localhost;

    # 前端页面
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 接口
    location /api/ {
        proxy_pass http://app:8888/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# HTTPS 配置（核心）
server {
    # 修复 http2 过时语法
    listen 443 ssl;
    http2 on;
    server_name localhost;

    # SSL 证书配置（已适配你重命名的证书）
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL 优化（适配自签名证书）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 注释掉自签名证书无效的 OCSP Stapling
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # 客户端真实 IP 透传
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # 前端页面根目录（本地开发可先创建临时 index.html 避免 403）
    root /usr/share/nginx/html;
    index index.html;

    # 前端路由处理（SPA 应用）- 增加 fallback 逻辑，避免循环重定向
    location / {
        try_files $uri $uri/ /index.html;
        # 本地开发无前端文件时，临时代理到后端（可选）
        # 如果没有前端文件，取消下面注释，直接代理到后端 API
        # proxy_pass http://app:8888/;
        # proxy_set_header Host $host;
        # proxy_set_header X-Real-IP $remote_addr;
    }

    # 静态资源（前端构建文件）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 静态文件（后端上传的文件）
    location /uploads/ {
        proxy_pass http://app:8888/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=604800";
    }

    # API 接口
    location /api/ {
        proxy_pass http://app:8888/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    # 健康检查（独立返回，不依赖前端/后端）
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 错误页面（本地开发可先创建临时 50x.html）
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        # 临时内容，避免 404
        return 200 "<h1>500 Server Error</h1>";
    }
}